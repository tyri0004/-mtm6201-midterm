<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyri0004 Midterm Project</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
   <div class="container">
        <header>
            <nav class="main-nav">
                <img src="images/my-coffee-shop-logo.svg" alt="company logo that says my coffee shop">
                <ul>
                    <li>About Us</li>
                    <li>Menu</li>
                    <li>Locations</li>
                </ul>
            </nav>
            <div class="banner">
                <h1>Experience Coffee like Never Before</h1>
                 <p>We craft more than beverages; we curate memories, one flavorful moment at a time. Embrace the aroma and let every visit be a chapter in your coffee story.</p>
                <button>Explore our menu</button>
            </div>
        </header>
        <main>
            <section class="wrapper">
                <article class="coffee-welcome">
                    <h2>Welcome to My Coffee House!</h2>
                    <h3>EXPERIENCE A NEW WAY TO TASTE COFFEE</h3>
                    <div class="coffee-images">
                        <img src="images/latte.jpeg" alt="latte art being poured into a cup">
                        <img src="images/coffee-beans.jpeg" alt="coffee beans in jar and on wooden table">
                        <img src="images/pouring-coffee.jpeg" alt="coffee being poured into a glass mug">
                        <img src="images/three-cups.jpeg" alt="three lattes in mugs being held in a circle by three different people">
                        <img src="images/smiling-employee.jpeg" alt="coffee shop employee smiling while making coffee">
                    </div>
                </article>
            </section>
        </main>
        <footer></footer>
  </div>
</body>
</html>
